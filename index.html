<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automatic Goggles</title>
  <meta name="description" content="Demonstrador do algoritmo de particionamento sequencial com frota limitada.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main>
    <section class="workspace">
      <div class="panel">
        <div class="panel-label">Sequência de Cargas</div>
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th id="item-weight-header">Peso</th>
              <th id="item-length-header">Comprimento</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="item-body"></tbody>
        </table>
        <button class="btn-row-add" type="button" id="add-item">+ adicionar carga</button>
      </div>

      <div class="panel">
        <div class="panel-label">Frota Disponível</div>
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th id="vehicle-units-header">Unidades Máx.</th>
              <th id="vehicle-weight-header">Peso Máx.</th>
              <th id="vehicle-min-charge-header">Cobrança Mín.</th>
              <th id="vehicle-length-header">Comprimento Máx.</th>
              <th id="vehicle-gap-header">Espaçamento</th>
              <th id="vehicle-fleet-header">Frota</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="vehicle-body"></tbody>
        </table>
        <button class="btn-row-add" type="button" id="add-vehicle">+ adicionar veículo</button>
      </div>
    </section>

    <section class="action-bar">
      <div class="objective-toggle" aria-label="Objetivo">
        <button class="obj-btn active" type="button" data-objective="cost">Menor Custo</button>
        <button class="obj-btn" type="button" data-objective="vehicles">Menos Veículos</button>
      </div>
      <button class="btn-solve" type="button" id="solve">Calcular Alocação</button>
      <span class="status-msg" id="status-msg">pronto para calcular</span>
    </section>

    <section class="results" id="results"></section>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
